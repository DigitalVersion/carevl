<svg width="1200" height="800" xmlns="http://www.w3.org/2000/svg">
  <!-- Definitions -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#64748b" />
    </marker>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Title -->
  <text x="600" y="30" text-anchor="middle" font-size="24" font-weight="bold" fill="#1e293b">
    CareVL State Machine - Quy trình Khám sức khỏe
  </text>

  <!-- Hub Preparation (One-time, top section) -->
  <g id="hub-prep">
    <rect x="50" y="60" width="1100" height="80" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" rx="8"/>
    <text x="70" y="85" font-size="14" font-weight="bold" fill="#92400e">Hub Admin chuẩn bị (1 lần, trước khi phát trạm)</text>
    
    <rect x="70" y="95" width="200" height="30" fill="#fbbf24" stroke="#f59e0b" stroke-width="1" rx="3"/>
    <text x="170" y="115" text-anchor="middle" fill="white" font-size="11">1. Tạo Bot Account + Repos</text>
    
    <line x1="270" y1="110" x2="290" y2="110" stroke="#92400e" stroke-width="2" marker-end="url(#arrowhead)"/>
    
    <rect x="290" y="95" width="200" height="30" fill="#fbbf24" stroke="#f59e0b" stroke-width="1" rx="3"/>
    <text x="390" y="115" text-anchor="middle" fill="white" font-size="11">2. Generate Fine-grained PATs</text>
    
    <line x1="490" y1="110" x2="510" y2="110" stroke="#92400e" stroke-width="2" marker-end="url(#arrowhead)"/>
    
    <rect x="510" y="95" width="200" height="30" fill="#fbbf24" stroke="#f59e0b" stroke-width="1" rx="3"/>
    <text x="610" y="115" text-anchor="middle" fill="white" font-size="11">3. Export Invite Codes</text>
    
    <line x1="710" y1="110" x2="730" y2="110" stroke="#92400e" stroke-width="2" marker-end="url(#arrowhead)"/>
    
    <rect x="730" y="95" width="200" height="30" fill="#fbbf24" stroke="#f59e0b" stroke-width="1" rx="3"/>
    <text x="830" y="115" text-anchor="middle" fill="white" font-size="11">4. Gửi qua Zalo/Email</text>
  </g>

  <!-- Gateway Setup States (Station side) -->
  <g id="gateway-setup">
    <rect x="50" y="160" width="1100" height="120" fill="#dbeafe" stroke="#3b82f6" stroke-width="2" rx="8"/>
    <text x="70" y="185" font-size="14" font-weight="bold" fill="#1e40af">Trạm cài đặt (Tự làm theo hướng dẫn)</text>
    
    <!-- State 1: Nhập Invite Code -->
    <rect x="70" y="200" width="200" height="60" fill="#3b82f6" stroke="#2563eb" stroke-width="2" rx="5" filter="url(#shadow)"/>
    <text x="170" y="220" text-anchor="middle" fill="white" font-size="12" font-weight="bold">1. Nhập Invite Code</text>
    <text x="170" y="235" text-anchor="middle" fill="white" font-size="10">{PAT, repo_url,</text>
    <text x="170" y="248" text-anchor="middle" fill="white" font-size="10">station_name}</text>
    
    <!-- Arrow -->
    <line x1="270" y1="230" x2="310" y2="230" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>
    
    <!-- State 2: Xác nhận tên trạm -->
    <rect x="310" y="200" width="200" height="60" fill="#3b82f6" stroke="#2563eb" stroke-width="2" rx="5" filter="url(#shadow)"/>
    <text x="410" y="220" text-anchor="middle" fill="white" font-size="12" font-weight="bold">2. Xác nhận tên trạm</text>
    <text x="410" y="235" text-anchor="middle" fill="white" font-size="10">(Pre-filled,</text>
    <text x="410" y="248" text-anchor="middle" fill="white" font-size="10">chỉ confirm)</text>
    
    <!-- Arrow -->
    <line x1="510" y1="230" x2="550" y2="230" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>
    
    <!-- State 3: New/Restore -->
    <rect x="550" y="200" width="200" height="60" fill="#3b82f6" stroke="#2563eb" stroke-width="2" rx="5" filter="url(#shadow)"/>
    <text x="650" y="220" text-anchor="middle" fill="white" font-size="12" font-weight="bold">3. New / Restore</text>
    <text x="650" y="235" text-anchor="middle" fill="white" font-size="10">(App tự git pull</text>
    <text x="650" y="248" text-anchor="middle" fill="white" font-size="10">nếu Restore)</text>
    
    <!-- Arrow -->
    <line x1="750" y1="230" x2="790" y2="230" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>
    
    <!-- State 4: PIN Setup -->
    <rect x="790" y="200" width="140" height="60" fill="#3b82f6" stroke="#2563eb" stroke-width="2" rx="5" filter="url(#shadow)"/>
    <text x="860" y="225" text-anchor="middle" fill="white" font-size="12" font-weight="bold">4. Đặt PIN</text>
    <text x="860" y="240" text-anchor="middle" fill="white" font-size="10">(6 số)</text>
    
    <!-- Arrow to Ready -->
    <line x1="930" y1="230" x2="980" y2="230" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>
    
    <!-- Ready State -->
    <ellipse cx="1030" cy="230" rx="60" ry="30" fill="#10b981" stroke="#059669" stroke-width="2" filter="url(#shadow)"/>
    <text x="1030" y="235" text-anchor="middle" fill="white" font-size="12" font-weight="bold">READY</text>
  </g>

  <!-- Main Workflow States -->
  
  <!-- Persona A: Tiếp nhận -->
  <g id="persona-a">
    <rect x="50" y="320" width="300" height="150" fill="#fef3c7" stroke="#fbbf24" stroke-width="2" rx="8"/>
    <text x="70" y="345" font-size="14" font-weight="bold" fill="#92400e">Persona A: Tiếp nhận (Operator)</text>
    
    <rect x="70" y="360" width="260" height="90" fill="#fbbf24" stroke="#f59e0b" stroke-width="2" rx="5" filter="url(#shadow)"/>
    <text x="200" y="385" text-anchor="middle" fill="white" font-size="14" font-weight="bold">1. Tiếp nhận mới</text>
    <text x="200" y="405" text-anchor="middle" fill="white" font-size="11">• Quét CCCD</text>
    <text x="200" y="420" text-anchor="middle" fill="white" font-size="11">• Tạo UUIDv5 (Encounter)</text>
    <text x="200" y="435" text-anchor="middle" fill="white" font-size="11">• Phát Sticker ID</text>
  </g>

  <!-- Arrow to Persona B -->
  <line x1="200" y1="470" x2="200" y2="520" stroke="#64748b" stroke-width="3" marker-end="url(#arrowhead)"/>
  <text x="220" y="500" font-size="11" fill="#475569">Bệnh nhân vào hàng đợi</text>

  <!-- Persona B: Lâm sàng -->
  <g id="persona-b">
    <rect x="50" y="520" width="300" height="200" fill="#dbeafe" stroke="#3b82f6" stroke-width="2" rx="8"/>
    <text x="70" y="545" font-size="14" font-weight="bold" fill="#1e40af">Persona B: Lâm sàng (Clinician)</text>
    
    <!-- State 2: Lượt khám -->
    <rect x="70" y="560" width="260" height="60" fill="#3b82f6" stroke="#2563eb" stroke-width="2" rx="5" filter="url(#shadow)"/>
    <text x="200" y="585" text-anchor="middle" fill="white" font-size="14" font-weight="bold">2. Lượt khám</text>
    <text x="200" y="605" text-anchor="middle" fill="white" font-size="11">Xem hàng đợi, chọn BN</text>
    
    <!-- Arrow down -->
    <line x1="200" y1="620" x2="200" y2="640" stroke="#1e40af" stroke-width="2" marker-end="url(#arrowhead)"/>
    
    <!-- State 3: Hồ sơ BN -->
    <rect x="70" y="640" width="260" height="60" fill="#3b82f6" stroke="#2563eb" stroke-width="2" rx="5" filter="url(#shadow)"/>
    <text x="200" y="665" text-anchor="middle" fill="white" font-size="14" font-weight="bold">3. Hồ sơ bệnh nhân</text>
    <text x="200" y="685" text-anchor="middle" fill="white" font-size="11">Nhập sinh hiệu, lịch sử</text>
  </g>

  <!-- Arrow to Persona C (delayed) -->
  <path d="M 350 670 L 450 670 L 450 590 L 520 590" stroke="#64748b" stroke-width="3" stroke-dasharray="5,5" marker-end="url(#arrowhead)" fill="none"/>
  <text x="380" y="660" font-size="11" fill="#475569">Kết quả trễ</text>
  <text x="380" y="675" font-size="11" fill="#475569">(Lab, X-ray)</text>

  <!-- Persona C: Nhập liệu -->
  <g id="persona-c">
    <rect x="520" y="520" width="300" height="150" fill="#fce7f3" stroke="#ec4899" stroke-width="2" rx="8"/>
    <text x="540" y="545" font-size="14" font-weight="bold" fill="#9f1239">Persona C: Nhập liệu (Lab Tech)</text>
    
    <rect x="540" y="560" width="260" height="90" fill="#ec4899" stroke="#db2777" stroke-width="2" rx="5" filter="url(#shadow)"/>
    <text x="670" y="585" text-anchor="middle" fill="white" font-size="14" font-weight="bold">5. Cập nhật kết quả</text>
    <text x="670" y="605" text-anchor="middle" fill="white" font-size="11">• Quét Sticker ID</text>
    <text x="670" y="620" text-anchor="middle" fill="white" font-size="11">• Nhập DiagnosticReport</text>
    <text x="670" y="635" text-anchor="middle" fill="white" font-size="11">• Link về Encounter</text>
  </g>

  <!-- Persona D: Trưởng trạm (Right side) -->
  <g id="persona-d">
    <rect x="870" y="320" width="280" height="400" fill="#f3e8ff" stroke="#a855f7" stroke-width="2" rx="8"/>
    <text x="890" y="345" font-size="14" font-weight="bold" fill="#6b21a8">Persona D: Trưởng trạm</text>
    
    <!-- State 4: Aggregate -->
    <rect x="890" y="360" width="240" height="50" fill="#a855f7" stroke="#9333ea" stroke-width="2" rx="5" filter="url(#shadow)"/>
    <text x="1010" y="390" text-anchor="middle" fill="white" font-size="12" font-weight="bold">4. Nhập liệu (Aggregate)</text>
    
    <!-- State 6: Reports -->
    <rect x="890" y="430" width="240" height="50" fill="#a855f7" stroke="#9333ea" stroke-width="2" rx="5" filter="url(#shadow)"/>
    <text x="1010" y="460" text-anchor="middle" fill="white" font-size="12" font-weight="bold">6. Báo cáo</text>
    
    <!-- State 7: Export Hub -->
    <rect x="890" y="500" width="240" height="50" fill="#a855f7" stroke="#9333ea" stroke-width="2" rx="5" filter="url(#shadow)"/>
    <text x="1010" y="530" text-anchor="middle" fill="white" font-size="12" font-weight="bold">7. Xuất dữ liệu Hub</text>
    
    <!-- State 8: Audit -->
    <rect x="890" y="570" width="240" height="50" fill="#a855f7" stroke="#9333ea" stroke-width="2" rx="5" filter="url(#shadow)"/>
    <text x="1010" y="600" text-anchor="middle" fill="white" font-size="12" font-weight="bold">8. Liên thông (Audit)</text>
    
    <!-- State 9: Settings -->
    <rect x="890" y="640" width="240" height="50" fill="#a855f7" stroke="#9333ea" stroke-width="2" rx="5" filter="url(#shadow)"/>
    <text x="1010" y="670" text-anchor="middle" fill="white" font-size="12" font-weight="bold">9. Cài đặt trạm</text>
  </g>

  <!-- Data flow arrows -->
  <path d="M 350 405 L 870 405" stroke="#64748b" stroke-width="2" stroke-dasharray="3,3" marker-end="url(#arrowhead)" fill="none"/>
  <text x="580" y="395" text-anchor="middle" font-size="10" fill="#475569">Dữ liệu → Reports/Export</text>
  
  <path d="M 820 605 L 870 605" stroke="#64748b" stroke-width="2" stroke-dasharray="3,3" marker-end="url(#arrowhead)" fill="none"/>

  <!-- Legend -->
  <g id="legend">
    <rect x="50" y="740" width="1100" height="50" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1" rx="5"/>
    <text x="70" y="760" font-size="14" font-weight="bold" fill="#1e293b">Chú thích:</text>
    
    <rect x="70" y="770" width="15" height="15" fill="#fbbf24" stroke="#f59e0b" stroke-width="1"/>
    <text x="95" y="782" font-size="11" fill="#475569">Hub chuẩn bị (1 lần)</text>
    
    <rect x="250" y="770" width="15" height="15" fill="#3b82f6" stroke="#2563eb" stroke-width="1"/>
    <text x="275" y="782" font-size="11" fill="#475569">Trạm cài đặt (4 bước)</text>
    
    <rect x="430" y="770" width="15" height="15" fill="#fbbf24" stroke="#f59e0b" stroke-width="1"/>
    <text x="455" y="782" font-size="11" fill="#475569">Persona A: Tiếp nhận</text>
    
    <rect x="610" y="770" width="15" height="15" fill="#3b82f6" stroke="#2563eb" stroke-width="1"/>
    <text x="635" y="782" font-size="11" fill="#475569">Persona B: Lâm sàng</text>
    
    <rect x="790" y="770" width="15" height="15" fill="#ec4899" stroke="#db2777" stroke-width="1"/>
    <text x="815" y="782" font-size="11" fill="#475569">Persona C: Nhập liệu</text>
    
    <rect x="970" y="770" width="15" height="15" fill="#a855f7" stroke="#9333ea" stroke-width="1"/>
    <text x="995" y="782" font-size="11" fill="#475569">Persona D: Trưởng trạm</text>
  </g>
</svg>