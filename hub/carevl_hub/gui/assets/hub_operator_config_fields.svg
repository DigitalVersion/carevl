  <rect x="40" y="275" width="740" height="200" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2"/>
  <text x="410" y="302" text-anchor="middle" font-size="14" font-weight="bold" fill="#334155">Form Streamlit (4 o)</text>
  <rect x="60" y="318" width="160" height="44" rx="4" fill="#c7d2fe" stroke="#6366f1"/>
  <text x="140" y="346" text-anchor="middle" font-size="11" fill="#312e81">Org / user (slug)</text>
  <rect x="235" y="318" width="160" height="44" rx="4" fill="#bbf7d0" stroke="#16a34a"/>
  <text x="315" y="346" text-anchor="middle" font-size="11" fill="#14532d">OUTPUT_DIR</text>
  <rect x="410" y="318" width="170" height="44" rx="4" fill="#fde68a" stroke="#d97706"/>
  <text x="495" y="346" text-anchor="middle" font-size="11" fill="#78350f">Encryption key</text>
  <rect x="595" y="318" width="165" height="44" rx="4" fill="#c7d2fe" stroke="#6366f1"/>
  <text x="677" y="346" text-anchor="middle" font-size="11" fill="#312e81">GitHub PAT</text>

  <text x="410" y="395" text-anchor="middle" font-size="11" fill="#475569">Thu tu dien tu do - du 4 nguon o tren la du cho download / decrypt sau nay.</text>
  <text x="410" y="418" text-anchor="middle" font-size="11" fill="#64748b">Chi xem checklist: co the de trong PAT / key tam; OUTPUT_DIR giu mac dinh.</text>
  <text x="410" y="448" text-anchor="middle" font-size="10" fill="#94a3b8">Tai lieu: AGENTS/ACTIVE/29, 08, FEATURES/hub_operator_gui.md, 26_Visualization</text>
