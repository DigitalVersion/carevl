  <rect width="820" height="520" fill="#f8fafc"/>
  <text x="410" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#0f172a">Tab 1 - Cau hinh Hub: lay gia tri tu dau?</text>
  <text x="410" y="54" text-anchor="middle" font-size="12" fill="#64748b">Khong phai thu tu nhap - chi la nguon goc tung o trong form</text>

  <rect x="40" y="85" width="240" height="150" rx="8" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/>
  <text x="160" y="112" text-anchor="middle" font-size="14" font-weight="bold" fill="#312e81">GitHub (trinh duyet)</text>
  <text x="55" y="138" font-size="11" fill="#4338ca">- PAT: Settings / Developer settings /</text>
  <text x="55" y="154" font-size="11" fill="#4338ca">  Personal access tokens - tao va copy</text>
  <text x="55" y="178" font-size="11" fill="#4338ca">- Org slug: phan sau github.com/</text>
  <text x="55" y="194" font-size="11" fill="#4338ca">  vi du ...com/DigitalVersion/carevl</text>
  <text x="55" y="218" font-size="11" fill="#4338ca">-&gt; o PAT va o Org / user</text>

  <rect x="310" y="85" width="220" height="150" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="420" y="112" text-anchor="middle" font-size="14" font-weight="bold" fill="#14532d">May Hub (Windows)</text>
  <text x="325" y="138" font-size="11" fill="#166534">- OUTPUT_DIR = thu muc ban chon</text>
  <text x="325" y="154" font-size="11" fill="#166534">  de luu file tai ve / xu ly</text>
  <text x="325" y="178" font-size="11" fill="#166534">- Mac dinh ./hub_data = con cua</text>
  <text x="325" y="194" font-size="11" fill="#166534">  thu muc chay carevl-hub</text>
  <text x="325" y="218" font-size="11" fill="#166534">-&gt; o Thu muc du lieu Hub</text>

  <rect x="560" y="85" width="220" height="150" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="670" y="112" text-anchor="middle" font-size="14" font-weight="bold" fill="#78350f">Tram Edge / invite</text>
  <text x="575" y="138" font-size="11" fill="#92400e">- ENCRYPTION_KEY trong .env tram</text>
  <text x="575" y="154" font-size="11" fill="#92400e">  (hoac gui kem invite)</text>
  <text x="575" y="178" font-size="11" fill="#92400e">- Phai trung voi key ma hoa</text>
  <text x="575" y="194" font-size="11" fill="#92400e">  snapshot *.db.enc</text>
  <text x="575" y="218" font-size="11" fill="#92400e">-&gt; o Encryption key</text>

  <line x1="160" y1="235" x2="160" y2="268" stroke="#64748b" stroke-width="2" marker-end="url(#ah)"/>
  <line x1="420" y1="235" x2="280" y2="268" stroke="#64748b" stroke-width="2" marker-end="url(#ah)"/>
